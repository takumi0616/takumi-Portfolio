name: build-check

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main
    paths:
      - .github/workflows/frontend_build.yml
      - .vscode/**
      - app/**
      - i18n/**
      - public/**
      - proxy.ts
      - .eslintrc.json
      - .gitignore
      - .prettierrc
      - README.md
      - next.config.js
      - package.json
      - package-lock.json
      - postcss.config.js
      - tailwind.config.ts
      - tsconfig.json

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Run tests
        run: npm run test --if-present
